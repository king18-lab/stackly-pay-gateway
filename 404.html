<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Stackly</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#4f46e5,#06b6d4);
color:white;
text-align:center;
overflow:hidden;
}

/* container */

.stackly404{
max-width:600px;
padding:40px;
}

/* big 404 */

.stackly404 h1{
font-size:140px;
font-weight:700;
letter-spacing:5px;
animation:float 3s ease-in-out infinite;
}

/* subtitle */

.stackly404 h2{
font-size:28px;
margin-bottom:10px;
}

.stackly404 p{
opacity:0.9;
margin-bottom:30px;
}

/* buttons */

.stackly-btn{
display:inline-block;
padding:14px 30px;
background:white;
color:#4f46e5;
border-radius:40px;
text-decoration:none;
font-weight:600;
transition:0.3s;
margin:10px;
}

.stackly-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* search box */

.search-box{
margin-top:20px;
}

.search-box input{
padding:12px 15px;
border:none;
border-radius:30px 0 0 30px;
outline:none;
width:200px;
}

.search-box button{
padding:12px 18px;
border:none;
background:#111;
color:white;
border-radius:0 30px 30px 0;
cursor:pointer;
}

/* floating animation */

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

/* mobile */

@media(max-width:768px){

.stackly404 h1{
font-size:90px;
}

.stackly404 h2{
font-size:22px;
}

.search-box input{
width:140px;
}

}

</style>
</head>

<body>

<div class="stackly404">

<h1>404</h1>

<h2>Page Not Found</h2>

<p>The page you're looking for doesn’t exist or was moved.</p>

<a href="index.html" class="stackly-btn">⬅ Back to Home</a>

</div>

</body>
</html>
